<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h1>Rock Paper Scissors</h1>

        <div class="game-area">
            <div class="stage">
                <div class="player-field">
                    <p>YOU</p>
                    <div id="user-show" class="show-box"></div>
                </div>
                <div class="player-field">
                    <p>COMPUTER</p>
                    <div id="comp-show" class="show-box"></div>
                </div>
            </div>

            <div class="score-board">
                <div class="score">
                    <p id="user-score">0</p>
                    <span>YOU</span>
                </div>
                <div class="score">
                    <p id="comp-score">0</p>
                    <span>COMP</span>
                </div>
            </div>

            <div class="choices">
                <div class="choice" id="rock"><img src="Rock.png" alt="Rock"></div>
                <div class="choice" id="paper"><img src="Paper.png" alt="Paper"></div>
                <div class="choice" id="scissors"><img src="Scissor.png" alt="Scissor"></div> 
            </div>

            <div class="msg-container">
                <p id="msg">Choose Your Move</p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
